<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Test Schedule — 10C</title>
<meta name="description" content="Monthly test schedule for Class 10-C. View exam dates and subjects.">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #21262d;
  --accent: #58a6ff;
  --text: #e6edf3;
  --muted: #8b949e;
  --green: #3fb950;
  --red: #f78166;
  --orange: #ffa657;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  padding: 1.5rem 1rem 3rem;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.5rem;
  gap: 0.75rem;
  animation: fadeUp 0.5s ease;
}
.title {
  font-family: 'Syne', sans-serif;
  font-size: clamp(1.4rem, 5vw, 2.4rem);
  font-weight: 800;
  letter-spacing: -0.03em;
  white-space: nowrap;
}
.title span { color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; justify-content: flex-end; }

.back-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 0.4rem 1rem;
  border-radius: 20px;
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
}
.back-btn:hover { border-color: var(--accent); color: var(--accent); }

.login-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 0.4rem 1rem;
  border-radius: 20px;
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  cursor: pointer;
  transition: all 0.2s;
}
.login-btn:hover { border-color: var(--accent); color: var(--accent); }

.admin-badge {
  display: none;
  align-items: center;
  gap: 0.4rem;
  background: rgba(63,185,80,0.12);
  border: 1px solid rgba(63,185,80,0.3);
  color: var(--green);
  padding: 0.38rem 0.85rem;
  border-radius: 20px;
  font-size: 0.7rem;
}
.admin-badge.on { display: flex; }
.admin-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }

.logout-btn {
  display: none;
  background: transparent;
  border: 1px solid rgba(247,129,102,0.3);
  color: var(--red);
  padding: 0.38rem 0.85rem;
  border-radius: 20px;
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  cursor: pointer;
  transition: background 0.2s;
}
.logout-btn:hover { background: rgba(247,129,102,0.08); }
.logout-btn.on { display: block; }

.reset-btn {
  display: none;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 0.38rem 0.85rem;
  border-radius: 20px;
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.2s;
}
.reset-btn:hover { border-color: var(--red); color: var(--red); }
body.admin .reset-btn { display: block; }

/* SUBTITLE */
.subtitle {
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 1.75rem;
  animation: fadeUp 0.5s ease 0.05s both;
}

/* EDIT HINT */
.edit-hint {
  display: none;
  font-size: 0.68rem;
  color: var(--orange);
  text-align: center;
  margin-bottom: 1rem;
  letter-spacing: 0.06em;
}
body.admin .edit-hint { display: block; }

/* MODAL */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(5px);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2rem;
  width: 92%;
  max-width: 340px;
  position: relative;
  animation: modalPop 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.modal-title {
  font-family: 'Syne', sans-serif;
  font-size: 1.15rem;
  font-weight: 800;
  margin-bottom: 1.5rem;
  letter-spacing: -0.02em;
}
.modal-close {
  position: absolute;
  top: 0.9rem; right: 0.9rem;
  background: none; border: none;
  color: var(--muted);
  font-size: 1rem;
  cursor: pointer;
  padding: 0.3rem 0.5rem;
  border-radius: 6px;
  transition: all 0.15s;
}
.modal-close:hover { background: var(--border); color: var(--text); }

.form-grp { margin-bottom: 1rem; }
.form-grp label {
  display: block;
  font-size: 0.66rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 0.4rem;
}
.form-grp input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.65rem 0.85rem;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
}
.form-grp input:focus { border-color: var(--accent); }

.modal-submit {
  width: 100%;
  background: var(--accent);
  color: #0d1117;
  border: none;
  border-radius: 8px;
  padding: 0.78rem;
  font-family: 'Syne', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  margin-top: 0.5rem;
  transition: opacity 0.2s, transform 0.1s;
}
.modal-submit:hover { opacity: 0.88; }
.modal-submit:active { transform: scale(0.98); }

/* SCHEDULE TABLE */
.table-wrap {
  border-radius: 12px;
  border: 1px solid var(--border);
  overflow: hidden;
  animation: fadeUp 0.5s ease 0.1s both;
}
table { width: 100%; border-collapse: collapse; }

thead th {
  background: var(--surface);
  padding: 0.78rem 1rem;
  text-align: left;
  font-family: 'Syne', sans-serif;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  border-bottom: 2px solid var(--accent);
  white-space: nowrap;
}
thead th.th-no {
  color: var(--muted);
  border-bottom-color: var(--border);
  width: 3rem;
  text-align: center;
}
thead th.th-date { width: 10rem; }
thead th.th-day  { width: 7rem; }
thead th.th-sub  { /* flex */ }

tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
tbody tr:hover { background: rgba(88,166,255,0.035); }
tbody tr:last-child { border-bottom: none; }

/* Week dividers */
tbody tr.week-divider td {
  background: #1c2128;
  border-bottom: 1px dashed var(--border);
  padding: 0.38rem 1rem;
  font-size: 0.62rem;
  letter-spacing: 0.2em;
  color: var(--orange);
  text-transform: uppercase;
  pointer-events: none;
}

.td-no {
  padding: 0.85rem 1rem;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.72rem;
  color: var(--muted);
  text-align: center;
  border-right: 1px solid var(--border);
  background: var(--surface);
  white-space: nowrap;
}
.td-date {
  padding: 0.85rem 1rem;
  font-size: 0.78rem;
  border-right: 1px solid var(--border);
  white-space: nowrap;
  color: var(--text);
}
.td-day-cell {
  padding: 0.85rem 1rem;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.72rem;
  letter-spacing: 0.04em;
  border-right: 1px solid var(--border);
  background: var(--surface);
  white-space: nowrap;
}
.td-sub {
  padding: 0.6rem 1rem;
  vertical-align: middle;
}
body.admin .td-sub { cursor: pointer; }
body.admin .td-sub:hover .pill { filter: brightness(1.2); transform: scale(1.04); }

/* PILLS */
.pill {
  display: inline-block;
  padding: 0.28rem 0.65rem;
  border-radius: 6px;
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  white-space: nowrap;
  transition: filter 0.15s, transform 0.15s;
}
.edit-input {
  background: var(--bg);
  border: 1px solid var(--accent);
  border-radius: 6px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  padding: 0.26rem 0.45rem;
  width: 120px;
  outline: none;
}

/* Subject colors */
.c-ENG-L { background:rgba(63,185,80,.15);   color:#3fb950; border:1px solid rgba(63,185,80,.25); }
.c-ENG-LIT { background:rgba(86,211,100,.15); color:#56d364; border:1px solid rgba(86,211,100,.25); }
.c-HIS   { background:rgba(187,128,9,.15);   color:#e3b341; border:1px solid rgba(187,128,9,.25); }
.c-GEO   { background:rgba(255,166,87,.15);  color:#ffa657; border:1px solid rgba(255,166,87,.25); }
.c-HINDI { background:rgba(255,123,114,.15); color:#ff7b72; border:1px solid rgba(255,123,114,.25); }
.c-PHY   { background:rgba(210,168,255,.15); color:#d2a8ff; border:1px solid rgba(210,168,255,.25); }
.c-MATHS { background:rgba(88,166,255,.15);  color:#58a6ff; border:1px solid rgba(88,166,255,.25); }
.c-CHEM  { background:rgba(247,129,102,.15); color:#f78166; border:1px solid rgba(247,129,102,.25); }
.c-BIO   { background:rgba(23,162,184,.15);  color:#17a2b8; border:1px solid rgba(23,162,184,.25); }
.c-COMP  { background:rgba(139,148,158,.15); color:#8b949e; border:1px solid rgba(139,148,158,.25); }

/* MOBILE CARDS */
.mobile-list {
  display: none;
  flex-direction: column;
  gap: 0.45rem;
  animation: fadeUp 0.3s ease both;
}
.mobile-entry {
  display: flex;
  align-items: center;
  gap: 0.85rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.85rem 1rem;
  transition: border-color 0.2s;
}
body.admin .mobile-entry:hover { border-color: rgba(88,166,255,0.4); }

.mobile-entry.week-sep {
  background: #1c2128;
  border: 1px dashed var(--border);
  justify-content: center;
  font-size: 0.62rem;
  letter-spacing: 0.2em;
  color: var(--orange);
  text-transform: uppercase;
  pointer-events: none;
}

.entry-num {
  font-size: 0.62rem;
  color: var(--muted);
  letter-spacing: 0.06em;
  min-width: 22px;
  text-align: center;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
}
.entry-meta {
  display: flex;
  flex-direction: column;
  gap: 0.18rem;
  flex: 1;
  min-width: 0;
}
.entry-date {
  font-size: 0.72rem;
  color: var(--muted);
}
.entry-day {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.06em;
}
.entry-sub-wrap { margin-left: auto; flex-shrink: 0; }

/* LEGEND */
.legend { margin-top: 1.5rem; display: flex; flex-wrap: wrap; gap: 0.4rem; animation: fadeUp 0.5s ease 0.2s both; }
.legend-title { width:100%; font-size:0.64rem; color:var(--muted); letter-spacing:0.15em; text-transform:uppercase; margin-bottom:0.2rem; }

/* RESPONSIVE */
@media (max-width: 620px) {
  .table-wrap { display: none; }
  .mobile-list { display: flex; }
  .subtitle { margin-bottom: 1.25rem; }
}
@media (min-width: 621px) {
  .table-wrap { display: block; }
  .mobile-list { display: none; }
}

/* ANIMATIONS */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
@keyframes modalPop {
  from { opacity:0; transform:scale(0.9); }
  to   { opacity:1; transform:scale(1); }
}
</style>
</head>
<body>

<div style="max-width:900px;margin:0 auto;">

  <div class="header">
    <div class="title">MONTHLY <span>TEST</span></div>
    <div class="header-right">
      <div class="admin-badge" id="adminBadge"><span class="admin-dot"></span>Editing</div>
      <button class="reset-btn" id="resetBtn" onclick="resetData()">↺ Reset</button>
      <button class="logout-btn" id="logoutBtn" onclick="logout()">Logout</button>
      <button class="login-btn" id="loginBtn" onclick="openModal()">Login</button>
      <a class="back-btn" href="/">← Back</a>
    </div>
  </div>

  <div class="subtitle">Class 10-C &nbsp;·&nbsp; May 2026 Schedule</div>

  <div class="edit-hint">✎ Tap any subject to rename it</div>

  <!-- Desktop Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="th-no">#</th>
          <th class="th-date">Date</th>
          <th class="th-day">Day</th>
          <th class="th-sub">Subject</th>
        </tr>
      </thead>
      <tbody id="schedBody"></tbody>
    </table>
  </div>

  <!-- Mobile List -->
  <div class="mobile-list" id="mobileList"></div>

  <div class="legend" id="legend"><div class="legend-title">Subjects</div></div>

</div>

<!-- Login Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">Sign In</div>
    <div class="form-grp">
      <label>Username</label>
      <input type="text" id="uInput" placeholder="username" autocomplete="off" spellcheck="false">
    </div>
    <div class="form-grp">
      <label>Password</label>
      <input type="password" id="pInput" placeholder="••••••••">
    </div>
    <button class="modal-submit" onclick="tryLogin()">Login</button>
  </div>
</div>

<script>
// ── DATA ────────────────────────────────────────────────────────────────────
const DEFAULT = [
  { date:"08-05-2026", day:"Friday",    sub:"ENG-L"   },
  { date:"09-05-2026", day:"Saturday",  sub:"ENG-LIT" },
  { date:"11-05-2026", day:"Monday",    sub:"HIS/CIV" },
  { date:"12-05-2026", day:"Tuesday",   sub:"GEO"     },
  { date:"13-05-2026", day:"Wednesday", sub:"HINDI"   },
  { date:"14-05-2026", day:"Thursday",  sub:"PHY"     },
  { date:"15-05-2026", day:"Friday",    sub:"MATHS"   },
  { date:"16-05-2026", day:"Saturday",  sub:"CHEM"    },
  { date:"18-05-2026", day:"Monday",    sub:"BIO"     },
  { date:"19-05-2026", day:"Tuesday",   sub:"COMP"    },
];

// Week 1: entries 0-4 (08–13 May), Week 2: entries 5-9 (14–19 May)
const WEEK_BREAK_AFTER = 4; // insert divider after index 4

const LABEL_MAP = {
  "ENG-L":   "Eng. Lang.",
  "ENG-LIT": "Eng. Lit.",
  "HIS/CIV": "His/Civ",
  "GEO":     "Geography",
  "HINDI":   "Hindi",
  "PHY":     "Physics",
  "MATHS":   "Maths",
  "CHEM":    "Chemistry",
  "BIO":     "Biology",
  "COMP":    "Comp. App.",
};

const CMAP = {
  "ENG-L":   "c-ENG-L",
  "ENG-LIT": "c-ENG-LIT",
  "HIS/CIV": "c-HIS",
  "GEO":     "c-GEO",
  "HINDI":   "c-HINDI",
  "PHY":     "c-PHY",
  "MATHS":   "c-MATHS",
  "CHEM":    "c-CHEM",
  "BIO":     "c-BIO",
  "COMP":    "c-COMP",
};
const CPOOL = ["c-ENG-L","c-ENG-LIT","c-HIS","c-GEO","c-HINDI","c-PHY","c-MATHS","c-CHEM","c-BIO","c-COMP"];

let data  = JSON.parse(localStorage.getItem('mt')||'null') || clone(DEFAULT);
let admin = false;

function clone(x){ return JSON.parse(JSON.stringify(x)); }
function save(){ localStorage.setItem('mt', JSON.stringify(data)); }
function getColor(s){
  if(CMAP[s]) return CMAP[s];
  let h=0; for(const c of s) h=(h*31+c.charCodeAt(0))&0xffff;
  return CPOOL[h%CPOOL.length];
}
function getLabel(s){ return LABEL_MAP[s] || s; }
function pill(s){ return `<span class="pill ${getColor(s)}">${getLabel(s)}</span>`; }

// ── MODAL ────────────────────────────────────────────────────────────────────
function openModal(){
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('uInput').focus(),80);
}
function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('uInput').value='';
  document.getElementById('pInput').value='';
}
function tryLogin(){
  const u=document.getElementById('uInput').value.trim();
  const p=document.getElementById('pInput').value;
  if(u==='buntu'&&p==='buntu'){
    admin=true;
    closeModal();
    document.body.classList.add('admin');
    document.getElementById('adminBadge').classList.add('on');
    document.getElementById('logoutBtn').classList.add('on');
    document.getElementById('loginBtn').style.display='none';
    render();
  }
}
function logout(){
  admin=false;
  document.body.classList.remove('admin');
  document.getElementById('adminBadge').classList.remove('on');
  document.getElementById('logoutBtn').classList.remove('on');
  document.getElementById('loginBtn').style.display='';
  render();
}
function resetData(){
  if(!confirm('Reset to original schedule?')) return;
  data=clone(DEFAULT); save(); render();
}

document.getElementById('pInput').addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();});
document.getElementById('uInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('pInput').focus();});
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))closeModal();});

// ── EDIT HELPERS ─────────────────────────────────────────────────────────────
function makeInput(container, idx, onDone){
  const old = data[idx].sub;
  const inp = document.createElement('input');
  inp.type='text'; inp.className='edit-input'; inp.value=old; inp.maxLength=20;
  container.innerHTML=''; container.appendChild(inp);
  inp.focus(); inp.select();
  function commit(){
    const val = inp.value.trim().toUpperCase() || old;
    data[idx].sub = val; save(); onDone();
  }
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e=>{
    if(e.key==='Enter'){ e.preventDefault(); inp.blur(); }
    if(e.key==='Escape'){ inp.value=old; inp.blur(); }
  });
}

// ── DESKTOP TABLE ─────────────────────────────────────────────────────────────
function renderTable(){
  const tbody = document.getElementById('schedBody');
  tbody.innerHTML = '';
  let examNum = 1;
  data.forEach((entry, idx)=>{
    // Week separator
    if(idx === WEEK_BREAK_AFTER + 1){
      const sep = document.createElement('tr');
      sep.className = 'week-divider';
      sep.innerHTML = `<td colspan="4">── Week 2 ──────────────────────────────</td>`;
      tbody.appendChild(sep);
    }
    const tr = document.createElement('tr');

    const tdNo = document.createElement('td');
    tdNo.className='td-no'; tdNo.textContent=examNum++;
    tr.appendChild(tdNo);

    const tdDate = document.createElement('td');
    tdDate.className='td-date'; tdDate.textContent=entry.date;
    tr.appendChild(tdDate);

    const tdDay = document.createElement('td');
    tdDay.className='td-day-cell'; tdDay.textContent=entry.day;
    tr.appendChild(tdDay);

    const tdSub = document.createElement('td');
    tdSub.className='td-sub'; tdSub.innerHTML=pill(entry.sub);
    if(admin) tdSub.addEventListener('click',()=>makeInput(tdSub, idx, render));
    tr.appendChild(tdSub);

    tbody.appendChild(tr);
  });
}

// ── MOBILE LIST ───────────────────────────────────────────────────────────────
function renderMobile(){
  const el = document.getElementById('mobileList');
  el.innerHTML='';
  let examNum=1;
  data.forEach((entry,idx)=>{
    if(idx === WEEK_BREAK_AFTER + 1){
      const sep = document.createElement('div');
      sep.className='mobile-entry week-sep';
      sep.textContent='── Week 2 ──';
      el.appendChild(sep);
    }
    const card = document.createElement('div');
    card.className='mobile-entry';

    const numEl = document.createElement('span');
    numEl.className='entry-num'; numEl.textContent=examNum++;

    const meta = document.createElement('div');
    meta.className='entry-meta';
    const dateEl = document.createElement('span');
    dateEl.className='entry-date'; dateEl.textContent=entry.date;
    const dayEl = document.createElement('span');
    dayEl.className='entry-day'; dayEl.textContent=entry.day.toUpperCase();
    meta.appendChild(dateEl); meta.appendChild(dayEl);

    const subWrap = document.createElement('span');
    subWrap.className='entry-sub-wrap'; subWrap.innerHTML=pill(entry.sub);
    if(admin){
      subWrap.style.cursor='pointer';
      subWrap.addEventListener('click',()=>makeInput(subWrap,idx,()=>{renderTable();renderMobile();renderLegend();}));
    }

    card.appendChild(numEl);
    card.appendChild(meta);
    card.appendChild(subWrap);
    el.appendChild(card);
  });
}

// ── LEGEND ────────────────────────────────────────────────────────────────────
function renderLegend(){
  const el = document.getElementById('legend');
  el.innerHTML='<div class="legend-title">Subjects</div>';
  [...new Set(data.map(r=>r.sub))].forEach(s=>{
    const sp = document.createElement('span');
    sp.className=`pill ${getColor(s)}`; sp.textContent=getLabel(s); el.appendChild(sp);
  });
}

function render(){ renderTable(); renderMobile(); renderLegend(); }
render();
</script>
</body>
</html>
